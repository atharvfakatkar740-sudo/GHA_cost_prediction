---
# ── PVC for ML model files ───────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  namespace: gha-cost-predictor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ── Deployment ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: gha-cost-predictor
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        # Wait for postgres to accept connections before starting the app
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-svc 5432; do
                echo "Waiting for postgres..."; sleep 2;
              done
      containers:
        - name: backend
          image: gha-cost-predictor/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: gha-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gha-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gha-secrets
                  key: JWT_SECRET_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gha-secrets
                  key: GITHUB_TOKEN
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: gha-secrets
                  key: GITHUB_WEBHOOK_SECRET
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: gha-secrets
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gha-secrets
                  key: SMTP_PASSWORD
            - name: SMTP_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: gha-secrets
                  key: SMTP_FROM_EMAIL
          volumeMounts:
            - name: ml-models
              mountPath: /app/ml_models
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: ml-models
          persistentVolumeClaim:
            claimName: ml-models-pvc

---
# ── Service ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: gha-cost-predictor
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
